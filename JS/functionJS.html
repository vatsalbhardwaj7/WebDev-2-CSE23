<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function in JS</title>
</head>
<body>
    <script>
        //function : Blockm of code, used or defined to perform specific task
        //types of function
        //normal function : - with para, without para and with default 

        // normal function without paramaters...

        function demo() {
            console.log("hello JS");
        }
        demo (); //function calling

        // with parametes 
        function demo1(text) {
            console.log("Hello " + text) ;
        }
        demo1("React");

        // default parameters 
        function add(a,b=12) {
            console.log("Addition is " + (a+b));
        }
        add (123);
        //Synchronous (sync) operations run sequentially, blocking further execution until a task completes, providing immediate consistency. Asynchronous (async) operations run concurrently or non-blockingly, allowing other tasks to proceed while waiting for a response, boosting efficiency and scalability in I/O-heavy applications. 
        //synchronous
        function cal () {
            function add (a,b) {
                console.log(a+b);
            }
            function mul (x,y) {
                console.log(x*y);
            }
            function sub (p,r) {
                console.log (p-r);
            }

            mul (3,6);

            sub(8,9);

            add (7,8);
        }
        cal ();

        //anonymous Function:- An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. These functions are primarily used for short, one-time tasks, as arguments to other functions (callbacks), or to create a local scope for variables. 

        let msg=function () {
            console.log("Hello ABES");
            // console.log(typeof(msg));
        }
        msg ();
        // short code for above function 
        let msg1=()=>console.log("Hello Abes EC");
        msg1 ();
        // arrow function using multiple lines 

        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("Result is " + res);
        }
        msg2(10,20);

        //IIFE:- An Immediately Invoked Function Expression (IIFE) is a JavaScript function that runs as soon as it is defined. It is a design pattern used to create a private scope for variables, preventing them from polluting the global namespace. 

        (function() {
            console.log("Hello World!");
        })();
        //short code for above function
        (msg=>console.log("Hello"))();

        // Promises:- A Promise in JavaScript is an object representing the eventual completion (or failure) of an asynchronous operation and its resulting value. It allows you to handle asynchronous code in a cleaner way than traditional callbacks, avoiding "callback hell". 

//         Asynchronous Operations: Promises manage non-blocking, time-consuming tasks (like fetching data) to keep applications responsive.
// States: A promise is always in one of three states: Pending (ongoing), Fulfilled (successful), or Rejected (failed).
// Immutability: Once settled (fulfilled or rejected), a promise's state cannot be changed. 

let myPromoise=new Promise(function(resolve,reject){
    let age=25;
    if(age>=18) {
        resolve("Valid age");
    } else {
        reject("wait for next year");
    }
});
myPromoise.then(msg=>console.log(msg)).catch(error=>console.log(error));

console.log(myPromoise);

//In JavaScript, the async and await keywords are modern syntax (introduced in ES2017) that make it easier to work with Promises by allowing you to write asynchronous code in a manner that looks and behaves more like synchronous, procedural code. 
//The async keyword is used to declare an asynchronous function. An async function always returns a Promise. If the function returns a non-Promise value, JavaScript automatically wraps it in a resolved Promise.
//The await keyword is used inside an async function to pause the execution of that function until a Promise is settled (either resolved or rejected). It then returns the Promise's resolved value, allowing it to be assigned to a variable just like a synchronous operation. 


/*

async function userInfo(){
    try{
let userData=await fetch('https://api.github.com/users/vatsalbhardwaj7-abes');
let response=await userData.json();
console.log(response);
    }//try end
    catch (error){
        console.log(error);
    }//catch end
    
}//function end 
// userInfo();

//Higher Order Function:- 16 Jan 2026 — Higher-order functions help make your code more reusable and modular by allowing you to work with functions like any other value.Read more

//map filter reduce foreach 

//.map(): Creates a new array by applying a provided function to every element in the original array.
//.filter(): Creates a new array with only the elements that satisfy a specific condition (return true for a provided function).
//.reduce(): Accumulates the elements of an array into a single value by applying a function (e.g., summing all values).
//.forEach(): Executes a provided function once for each array element, typically for side effects (like logging to the console), and does not return a new array.


let num=[4,6,7,8,9,3,2,1];


//map
let squareResult=num.map(n=>n*n);
console.log(squareResult);

//reduce
let sum=num.reduce((total,n)=>total+n);
console.log(sum);

//filter
let sorting=num.filter(n=>n>2);
console.log(sorting);

//forEach
num.forEach(n=>console.log(n*2));


//local storage:-
let myInfo={
    name:"Vatsal Bhardwaj",
    age:19,
    city:"Delhi"
};


    </script>
</body>
