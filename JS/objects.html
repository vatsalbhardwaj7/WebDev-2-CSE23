<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects in JS</title>
</head>
<body>
    <script>
        // objects in JS are collectin of key value pairs 
        // create an object using literal way and new keyword

        let student={
            name:"Vatsal",
            age:23,
            isMarried: false,
            address:{
                city:"Delhi",
                state:"Delhi",
                pincode:110021
            },
            education:["10th", "12th", "B.Tech"],
            degree: "B.Tech",
            branch: "CSE",
            year: 2025,
            getInfo:function(){
                return "my current education is " + student.degree;
            }
        };
        console.log(student);
        console.log(student.name);
        console.log(student.address.city);
        console.log(typeof(student));

        //find keys in object
        console.log('name' in student );
        // delete keys from object
        console.log(delete student.name);
        console.log(student);
        // find length of object
        let keysLength= Object.keys(student);
        console.log(keysLength.length);
        //iterate keys of object using for .. in loop
        for (let x in student){
            console.log(student[x]);
        }

        // create object using new keyword
        let myInfo=new Object();
        myInfo.name="Vatsal";
        myInfo.age=18;
        myInfo.isMarried=false;
        myInfo.sport="Cricket";
        console.log(myInfo.name); // using dot notation
        console.log(myInfo['age']); // using [] notation
    </script>
</body>
</html>
